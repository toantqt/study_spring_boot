spring.application.name=study_spring_boot
server.port=9000
# Database connection URL (default port for PostgreSQL is 5432)
spring.datasource.url=jdbc:postgresql://localhost:5434/my_postgres_db

# Database username and password
spring.datasource.username=admin
spring.datasource.password=password123

# Configure JPA/Hibernate properties
# 'update' automatically updates the database schema based on your entities
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true


